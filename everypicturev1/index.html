<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enoch Cologne Collection</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>  
  <main class="app">

    <section class="left">
        <div class="frame" id="frame">
            <img id="img" src="images/IMG_2866.jpeg" alt="Cologne collection photo" />
          
            <div class="zone" id="stronger"></div>
            <div class="zone" id="badboy"></div>
            <div class="zone" id="imagination"></div>
            <div class="zone" id="allure"></div>
            <div class="zone" id="bleu"></div>
            <div class="zone" id="bluetalisman"></div>
            <div class="zone" id="pacific"></div>
            <div class="zone" id="armanicode"></div>
            <div class="zone" id="valentino"></div>
            <div class="zone" id="blackbottle"></div>
          </div>
    </section>

    <aside class="right">

        <div class="rightInner">
          <h1 class="hero">
            <span>Enoch</span>
            <span>Cologne</span>
            <span>Collection</span>
          </h1>
      
          <div class="rule"></div>
      
          <p class="lede">
            Explore the fragrance wardrobe.<br />
            Click on any bottle in the image to<br />
            discover its story.
          </p>
      
          <div class="detailBlock">
            <h2 id="name">—</h2>
      
            <p class="label">Notes</p>
            <p id="notes">—</p>
      
            <p class="label">Why I love it</p>
            <p id="why">—</p>
      
            <p class="label">Best time to wear</p>
            <p id="time">—</p>
      
            <button id="resetBtn" class="reset" type="button">Reset</button>
          </div>
      
          <footer class="foot">
            <span>FEBRUARY COLLECTION </span>
            <span class="footRule"></span>
            <span>2026</span>
          </footer>
        </div>
      
      </aside>  
  </main>
</body>
</html>
